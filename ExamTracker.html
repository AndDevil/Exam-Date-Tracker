<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>📘 Exam Tracker – All Dates in One Place</title>
  <!-- Tailwind CSS + Font Awesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- flatpickr for date picking -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    /* card transition */
    .exam-card { transition: all 0.2s ease; }
    .exam-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4 md:p-6 font-sans">

  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold text-gray-800 flex items-center justify-center gap-3">
        <i class="fas fa-calendar-alt text-indigo-600"></i> 
        Exam Tracker Central
      </h1>
      <p class="text-gray-600 mt-2">Govt / Private | Forms | Admit Card | Exam Dates | Notifications</p>
      <button id="enableNotificationsBtn" class="mt-2 text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-800 px-3 py-1 rounded-full transition">
        <i class="fas fa-bell"></i> Enable Notifications
      </button>
    </div>

    <!-- Add / Edit Exam Form -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-gray-100">
      <h2 class="text-2xl font-bold text-gray-700 mb-4 flex items-center gap-2">
        <i class="fas fa-plus-circle text-green-600"></i> 
        <span id="formTitle">Add New Exam</span>
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 font-medium mb-1">Exam Name *</label>
          <input type="text" id="examName" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-400" placeholder="e.g., SSC CGL 2025">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Type</label>
          <select id="examType" class="w-full border border-gray-300 rounded-lg px-3 py-2">
            <option value="Government">🏛️ Government</option>
            <option value="Private">💼 Private</option>
          </select>
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Form Start Date</label>
          <input type="text" id="formStart" class="datepicker w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Pick date">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Form End Date</label>
          <input type="text" id="formEnd" class="datepicker w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Pick date">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Exam Date</label>
          <input type="text" id="examDate" class="datepicker w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Pick date">
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1">Admit Card Date</label>
          <input type="text" id="admitDate" class="datepicker w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Pick date">
        </div>
        <div class="md:col-span-2">
          <label class="block text-gray-700 font-medium mb-1">Advertisement URL (link to official notice)</label>
          <input type="url" id="adUrl" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="https://ssc.nic.in/notice/...">
        </div>
        <div class="md:col-span-2">
          <label class="block text-gray-700 font-medium mb-1">Additional Notes</label>
          <textarea id="notes" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="Eligibility, fee, age limit..."></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button id="saveBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow transition">
          <i class="fas fa-save"></i> Save Exam
        </button>
        <button id="cancelEditBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-lg hidden transition">
          Cancel Edit
        </button>
      </div>
    </div>

    <!-- Filters & Search -->
    <div class="flex flex-wrap gap-3 mb-6 items-center justify-between">
      <div class="flex gap-2">
        <button data-filter="all" class="filter-btn bg-indigo-100 text-indigo-800 px-4 py-1 rounded-full font-medium">All</button>
        <button data-filter="Government" class="filter-btn bg-gray-100 text-gray-700 px-4 py-1 rounded-full font-medium">Government</button>
        <button data-filter="Private" class="filter-btn bg-gray-100 text-gray-700 px-4 py-1 rounded-full font-medium">Private</button>
      </div>
      <div class="relative">
        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
        <input type="text" id="searchInput" placeholder="Search exam..." class="pl-9 pr-4 py-2 border rounded-full w-64 focus:outline-none focus:ring-2 focus:ring-indigo-300">
      </div>
    </div>

    <!-- Exams List -->
    <div id="examsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- dynamic cards will appear here -->
    </div>

    <!-- Empty state / fallback -->
    <div id="emptyState" class="text-center py-12 hidden">
      <i class="fas fa-folder-open text-5xl text-gray-400"></i>
      <p class="text-gray-500 mt-3">No exams added yet. Click "Add New Exam" above.</p>
    </div>
  </div>

  <script>
    // ---------- Data Model ----------
    let exams = [];          // array of exam objects
    let editId = null;      // if editing, store the id
    
    // Load from localStorage
    function loadData() {
      const stored = localStorage.getItem('examTracker');
      if(stored) {
        exams = JSON.parse(stored);
      } else {
        // sample demo data
        exams = [
          {
            id: Date.now()+1,
            name: "SSC CGL 2025",
            type: "Government",
            formStart: "2025-01-10",
            formEnd: "2025-02-10",
            examDate: "2025-05-15",
            admitDate: "2025-05-01",
            adUrl: "https://ssc.nic.in",
            notes: "Age 18-32, Graduation required",
            createdAt: new Date().toISOString()
          },
          {
            id: Date.now()+2,
            name: "TCS NQT 2025",
            type: "Private",
            formStart: "2025-02-01",
            formEnd: "2025-03-01",
            examDate: "2025-03-20",
            admitDate: "2025-03-10",
            adUrl: "https://tcs.com/careers",
            notes: "Online test, no fee",
            createdAt: new Date().toISOString()
          }
        ];
        saveToLocal();
      }
      renderExams();
      scheduleNotificationCheck(); // check for upcoming dates after loading
    }
    
    function saveToLocal() {
      localStorage.setItem('examTracker', JSON.stringify(exams));
    }
    
    // Helper: format date YYYY-MM-DD to readable
    function formatDate(dateStr) {
      if(!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }
    
    // Countdown days until a date (positive = days left)
    function daysUntil(dateStr) {
      if(!dateStr) return null;
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dateStr);
      target.setHours(0,0,0,0);
      const diff = Math.ceil((target - today) / (1000*60*60*24));
      return diff;
    }
    
    // Render exam cards with filtering and search
    let currentFilter = 'all';
    let currentSearch = '';
    
    function renderExams() {
      let filtered = [...exams];
      if(currentFilter !== 'all') {
        filtered = filtered.filter(ex => ex.type === currentFilter);
      }
      if(currentSearch.trim() !== '') {
        const searchLower = currentSearch.toLowerCase();
        filtered = filtered.filter(ex => ex.name.toLowerCase().includes(searchLower));
      }
      // sort by nearest exam date (null dates go last)
      filtered.sort((a,b) => {
        if(!a.examDate && !b.examDate) return 0;
        if(!a.examDate) return 1;
        if(!b.examDate) return -1;
        return new Date(a.examDate) - new Date(b.examDate);
      });
      
      const container = document.getElementById('examsContainer');
      const emptyDiv = document.getElementById('emptyState');
      
      if(filtered.length === 0) {
        container.innerHTML = '';
        emptyDiv.classList.remove('hidden');
        return;
      }
      emptyDiv.classList.add('hidden');
      
      container.innerHTML = filtered.map(exam => {
        const daysToExam = daysUntil(exam.examDate);
        let examBadge = '';
        if(daysToExam !== null && daysToExam < 0) examBadge = '<span class="text-xs bg-red-200 text-red-800 px-2 py-0.5 rounded-full">Exam passed</span>';
        else if(daysToExam !== null && daysToExam <= 7) examBadge = '<span class="text-xs bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full">⚠️ Coming soon</span>';
        
        const daysToFormEnd = daysUntil(exam.formEnd);
        let formWarning = '';
        if(daysToFormEnd !== null && daysToFormEnd >=0 && daysToFormEnd <= 5) formWarning = `<div class="text-xs text-red-600 mt-1"><i class="fas fa-hourglass-half"></i> Form ends in ${daysToFormEnd} days</div>`;
        
        return `
          <div class="exam-card bg-white rounded-xl shadow-md p-4 border-l-4 ${exam.type === 'Government' ? 'border-indigo-500' : 'border-emerald-500'}">
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-lg text-gray-800">${escapeHtml(exam.name)}</h3>
              <div class="flex gap-1">
                <button onclick="editExam('${exam.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                <button onclick="deleteExam('${exam.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>
              </div>
            </div>
            <div class="text-sm text-gray-500 mb-2 flex items-center gap-1">
              <i class="fas fa-tag"></i> ${exam.type}
              ${examBadge}
            </div>
            <div class="space-y-1 text-sm mt-2">
              ${exam.formStart ? `<div><i class="fas fa-calendar-plus w-5 text-gray-500"></i> Form: ${formatDate(exam.formStart)} → ${formatDate(exam.formEnd)}</div>` : ''}
              ${exam.examDate ? `<div><i class="fas fa-calendar-check w-5 text-gray-500"></i> Exam: ${formatDate(exam.examDate)} ${daysToExam !== null && daysToExam >=0 ? `(in ${daysToExam} days)` : daysToExam !== null && daysToExam<0 ? '(passed)' : ''}</div>` : ''}
              ${exam.admitDate ? `<div><i class="fas fa-id-card w-5 text-gray-500"></i> Admit Card: ${formatDate(exam.admitDate)} ${daysUntil(exam.admitDate) !== null && daysUntil(exam.admitDate) <= 3 && daysUntil(exam.admitDate) >=0 ? '<span class="text-red-500">🔥 soon</span>' : ''}</div>` : ''}
              ${formWarning}
            </div>
            ${exam.adUrl ? `<div class="mt-2"><a href="${exam.adUrl}" target="_blank" class="text-indigo-600 text-xs hover:underline"><i class="fas fa-link"></i> Official Notice</a></div>` : ''}
            ${exam.notes ? `<div class="mt-2 text-gray-600 text-xs border-t pt-2"><i class="fas fa-sticky-note"></i> ${escapeHtml(exam.notes)}</div>` : ''}
          </div>
        `;
      }).join('');
    }
    
    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // Save (Create or Update)
    function saveExam() {
      const name = document.getElementById('examName').value.trim();
      if(!name) { alert("Exam name is required"); return; }
      const examData = {
        name: name,
        type: document.getElementById('examType').value,
        formStart: document.getElementById('formStart').value || null,
        formEnd: document.getElementById('formEnd').value || null,
        examDate: document.getElementById('examDate').value || null,
        admitDate: document.getElementById('admitDate').value || null,
        adUrl: document.getElementById('adUrl').value.trim() || null,
        notes: document.getElementById('notes').value.trim() || null,
        createdAt: new Date().toISOString()
      };
      
      if(editId !== null) {
        // update existing
        const index = exams.findIndex(e => e.id == editId);
        if(index !== -1) {
          exams[index] = { ...exams[index], ...examData, id: editId };
        }
        editId = null;
        document.getElementById('formTitle').innerText = "Add New Exam";
        document.getElementById('cancelEditBtn').classList.add('hidden');
      } else {
        // add new
        const newId = Date.now();
        examData.id = newId;
        exams.push(examData);
      }
      saveToLocal();
      clearForm();
      renderExams();
      // after saving, check notifications for the newly added exam dates
      scheduleNotificationCheck();
    }
    
    function clearForm() {
      document.getElementById('examName').value = '';
      document.getElementById('examType').value = 'Government';
      document.getElementById('formStart').value = '';
      document.getElementById('formEnd').value = '';
      document.getElementById('examDate').value = '';
      document.getElementById('admitDate').value = '';
      document.getElementById('adUrl').value = '';
      document.getElementById('notes').value = '';
      editId = null;
      document.getElementById('formTitle').innerText = "Add New Exam";
      document.getElementById('cancelEditBtn').classList.add('hidden');
    }
    
    window.editExam = function(id) {
      const exam = exams.find(e => e.id == id);
      if(!exam) return;
      editId = id;
      document.getElementById('examName').value = exam.name;
      document.getElementById('examType').value = exam.type;
      document.getElementById('formStart').value = exam.formStart || '';
      document.getElementById('formEnd').value = exam.formEnd || '';
      document.getElementById('examDate').value = exam.examDate || '';
      document.getElementById('admitDate').value = exam.admitDate || '';
      document.getElementById('adUrl').value = exam.adUrl || '';
      document.getElementById('notes').value = exam.notes || '';
      document.getElementById('formTitle').innerText = "✏️ Edit Exam";
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    window.deleteExam = function(id) {
      if(confirm("Delete this exam permanently?")) {
        exams = exams.filter(e => e.id != id);
        saveToLocal();
        if(editId == id) clearForm();
        renderExams();
      }
    };
    
    document.getElementById('saveBtn').addEventListener('click', saveExam);
    document.getElementById('cancelEditBtn').addEventListener('click', clearForm);
    
    // Filter & Search listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-indigo-100', 'text-indigo-800'));
        btn.classList.add('bg-indigo-100', 'text-indigo-800');
        currentFilter = btn.getAttribute('data-filter');
        renderExams();
      });
    });
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderExams();
    });
    
    // ---------- NOTIFICATION LOGIC (Browser Notification API) ----------
    let notificationPermission = false;
    function requestNotificationPermission() {
      if ("Notification" in window) {
        Notification.requestPermission().then(perm => {
          if(perm === "granted") {
            notificationPermission = true;
            alert("Notifications enabled! You'll get reminders for upcoming exams.");
          } else {
            alert("Notification permission denied. You can enable it manually in browser settings.");
          }
        });
      } else {
        alert("Your browser does not support desktop notifications.");
      }
    }
    
    // Check all exams and send notification if any date is within 2 days (or exactly today)
    function checkUpcomingDatesAndNotify() {
      if (!notificationPermission && Notification.permission === "granted") {
        notificationPermission = true;
      }
      if (!notificationPermission && Notification.permission !== "granted") return;
      
      const today = new Date();
      today.setHours(0,0,0,0);
      let notificationsSent = false;
      
      exams.forEach(exam => {
        const dateFields = [
          { label: "Form Start", date: exam.formStart },
          { label: "Form End", date: exam.formEnd },
          { label: "Exam Date", date: exam.examDate },
          { label: "Admit Card Release", date: exam.admitDate }
        ];
        dateFields.forEach(field => {
          if(field.date) {
            const targetDate = new Date(field.date);
            targetDate.setHours(0,0,0,0);
            const diffDays = Math.ceil((targetDate - today) / (1000*60*60*24));
            if(diffDays >= 0 && diffDays <= 2) {
              // send notification (avoid spamming multiple times per reload - we can store last sent flag, but for simplicity we notify once per page load)
              // to prevent repeats, we could use localStorage flag but for demo it's fine.
              new Notification("📢 Exam Reminder", {
                body: `${exam.name}: ${field.label} is on ${formatDate(field.date)} (in ${diffDays} day${diffDays!==1 ? 's' : ''})`,
                icon: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
              });
              notificationsSent = true;
            }
          }
        });
      });
      if(notificationsSent) {
        console.log("Notifications sent for upcoming dates.");
      }
    }
    
    function scheduleNotificationCheck() {
      // check immediately on load and then every 6 hours
      checkUpcomingDatesAndNotify();
      if(window.notificationInterval) clearInterval(window.notificationInterval);
      window.notificationInterval = setInterval(() => {
        checkUpcomingDatesAndNotify();
      }, 6 * 60 * 60 * 1000);
    }
    
    // enable notifications button
    document.getElementById('enableNotificationsBtn').addEventListener('click', () => {
      requestNotificationPermission();
    });
    
    // init flatpickr on all .datepicker elements
    function initDatepickers() {
      flatpickr(".datepicker", {
        dateFormat: "Y-m-d",
        allowInput: true,
        altInput: true,
        altFormat: "d M Y"
      });
    }
    
    // Re-run flatpickr after dynamic content (no dynamic inputs except static form)
    initDatepickers();
    loadData();
    
    // If new exam fields added later, ensure flatpickr rebinds? Not needed because form is static.
    // Also set up beforeunload to save? Already saved on each operation.
  </script>
</body>
</html>
